name: Semgrep

on:
  push:
    branches: [ "main", "master" ]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install semgrep
        run: |
          pip install semgrep

      # Opcion A: usar reglas automáticas de Semgrep
      - name: Ejecutar Semgrep (auto)
        run: |
          semgrep scan --config auto --error

      # Opción B: usar tu script/reglas personalizadas
      # Si tienes reglas en semgrep_rules/ o semgrep.yml, por ejemplo:
      # - name: Ejecutar Semgrep con reglas propias
      #   run: |
      #     semgrep scan --config semgrep_rules/ --lang python --error
